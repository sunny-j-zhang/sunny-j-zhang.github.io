<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sunny J. Zhang</title>
    <script>
      // GitHub Pages SPA redirect — preserves path for React Router
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = window.location.origin + '/?p=' +
        encodeURIComponent(path + search) + hash;
      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
